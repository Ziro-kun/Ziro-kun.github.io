name: Auto Blog Post

on:
  push:
    paths:
      - 'input.txt'
      - 'style.md'
      - 'scripts/generatePost.js'
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run generate:post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit generated post
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add src/content/blog/*.md
          git diff --staged --quiet && echo "변경사항 없음, 스킵" && exit 0
          git commit -m "auto: generate blog post from input.txt"
          git push
